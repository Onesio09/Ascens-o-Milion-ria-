<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ascensão Milionária</title>
  <style>
    body {
      background-color: #000;
      color: #FFD700;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      font-size: 40px;
      margin-top: 40px;
      color: #FFD700;
    }
    p {
      font-size: 20px;
      color: #1E90FF;
    }
    form {
      margin-top: 30px;
    }
    input {
      padding: 12px;
      margin: 10px;
      width: 250px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }
    button {
      background-color: #FFD700;
      color: #000;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    footer {
      margin-top: 50px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <h1>Ascensão Milionária</h1>
  <p>Liberdade Financeira • Disciplina • Mentalidade</p>

  <form action="https://formspree.io/f/SEU_ENDPOINT" method="POST">
    <input type="text" name="nome" placeholder="Seu Nome" required>
    <input type="email" name="email" placeholder="Seu Email" required>
    <button type="submit">Quero minha ascensão</button>
  </form>

  <footer>
    © 2026 Ascensão Milionária — Todos os direitos reservados
  </footer>

</body>
  </html>
