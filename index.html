<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Profissional</title>
  <style>
    body {
      font-family: Poppins, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
      text-align: center;
      width: 320px;
    }
    h2 {
      margin-bottom: 15px;
      color: #333;
    }
    input[type="email"], button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background: #0077cc;
      color: #fff;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #005fa3;
    }
    .calculator {
      display: none;
      margin-top: 20px;
    }
    .calc-display {
      width: 100%;
      padding: 12px;
      font-size: 20px;
      margin-bottom: 12px;
      text-align: right;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .calc-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    .calc-buttons button {
      width: 22%;
      margin: 2% 0;
      padding: 15px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      background: #e0e6ed;
      cursor: pointer;
      transition: background 0.2s;
    }
    .calc-buttons button:hover {
      background: #cfd8e3;
    }
    .calc-buttons button.operator {
      background: #0077cc;
      color: #fff;
    }
    .calc-buttons button.operator:hover {
      background: #005fa3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Registre-se para usar a calculadora</h2>
    <input type="email" id="email" placeholder="Digite seu email">
    <button onclick="registrar()">Registrar</button>
    
    <div class="calculator" id="calculator">
      <input type="text" id="display" class="calc-display" disabled>
      <div class="calc-buttons">
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button class="operator" onclick="press('/')">÷</button>
        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button class="operator" onclick="press('*')">×</button>
        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button class="operator" onclick="press('-')">−</button>
        <button onclick="press('0')">0</button>
        <button onclick="press('.')">.</button>
        <button onclick="calculate()">=</button>
        <button class="operator" onclick="press('+')">+</button>
        <button onclick="clearDisplay()">C</button>
        <button onclick="backspace()">⌫</button>
        <button onclick="press('%')">%</button>
      </div>
    </div>
  </div>

  <script>
    function registrar() {
      const email = document.getElementById("email").value;
      const regex = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;
      if(regex.test(email)) {
        document.getElementById("calculator").style.display = "block";
      } else {
        alert("Por favor, insira um email válido.");
      }
    }
    function press(value) {
      document.getElementById("display").value += value;
    }
    function calculate() {
      try {
        document.getElementById("display").value = eval(document.getElementById("display").value);
      } catch {
        alert("Expressão inválida");
      }
    }
    function clearDisplay() {
      document.getElementById("display").value = "";
    }
    function backspace() {
      let current = document.getElementById("display").value;
      document.getElementById("display").value = current.slice(0, -1);
    }
  </script>
</body>
  </html>
